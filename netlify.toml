# Redirect rules for Netlify deployment (Root configuration)

# 1. Proxy API requests to your deployed backend (e.g. Render, Railway, etc.)
# Replace "https://YOUR-BACKEND-URL.onrender.com" with your actual backend URL after deploying it.
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-BACKEND-URL.onrender.com/api/:splat"
  status = 200
  force = true

# 2. Redirect all other paths to index.html to support single page app routing (Vite/React)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
